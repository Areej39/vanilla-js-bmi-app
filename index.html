<!-- index.html bmi-app -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
 </head>
 <body>
    <div class="container">
        <div class="header">
            <h1>BMI Calculator</h1>
            <p>Check your Body Mass Index</p>
        </div>

        <div class="input-section">
            <div class="weight-input">
                <label for="weight">Weight (kg):</label>
                <input type="number" id="weight" placeholder="e.g., 70" min="1" step="0.1" required>
            </div>
            <div class="height-input">
                <label for="height">Height (cm):</label>
                <input type="number" id="height" placeholder="e.g., 175" min="1" step="0.1" required>
            </div>
            <div class="button-group">
                <button id="calculateBtn">Calculate BMI</button>
                <button id="resetBtn" class="reset-btn">Reset</button>
            </div>
        </div>

        <div class="result-section">
            <div class="bmi-display">
                <span class="label">Your BMI:</span>
                <span id="bmiValue">--</span>
            </div>
            <div class="category-display">
                <span class="label">Your Category</span>
                <span id="bmiCategory">--</span>  
            </div>
        </div>

        <div class="info-section">
            <h3>BMI Categories:</h3>
            <ul>
                <li><span class="underweight">Underweight:</span> &lt; 18.5</li>
                <li><span class="normal">Normal:</span> 18.5 - 24.9</li>
                <li><span class="overweight">Overweight:</span> 25 - 29.9</li>
                <li><span class="obese">Obese:</span> ≥ 30</li>
            </ul>
        </div>     
    </div>

    <script src="script.js"></script>
 </body>
 </html>
